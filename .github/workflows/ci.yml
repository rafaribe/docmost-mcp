# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  integration:
    runs-on: ubuntu-latest
    needs: test
    env:
      DOCMOST_EMAIL: admin@test.local
      DOCMOST_PASSWORD: TestPassword123!
      DOCMOST_BASE_URL: http://localhost:3000
      MCP_URL: http://localhost:4000/mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Start Docmost stack
        run: docker compose -f docker-compose.integration.yml up -d

      - name: Wait for Docmost
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health; then
              echo "Docmost is ready"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 3
            if [ $i -eq 30 ]; then
              echo "Docmost failed to start after 90s"
              docker compose -f docker-compose.integration.yml logs
              exit 1
            fi
          done

      - name: Build and start MCP server
        run: |
          npm ci
          npm run build
          DOCMOST_BASE_URL=$DOCMOST_BASE_URL \
          DOCMOST_EMAIL=$DOCMOST_EMAIL \
          DOCMOST_PASSWORD=$DOCMOST_PASSWORD \
          PORT=4000 \
          node dist/index.js &
          for i in $(seq 1 15); do
            curl -sf http://localhost:4000/health && break
            sleep 1
          done

      - name: Run integration tests
        run: npm run test:integration

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.integration.yml down -v

  publish:
    needs: [test, integration]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions: write-all
    steps:
      - name: Lowercase repository owner
        run: echo "LOWERCASE_REPO_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SVU needs full history

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false

      - name: Compute next version
        id: version
        run: |
          go install github.com/caarlos0/svu/v3@latest
          echo "version=$(svu next)" >> $GITHUB_OUTPUT

      - name: Tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push origin :refs/tags/${{ steps.version.outputs.version }} 2>/dev/null || true
          git tag -f ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ env.LOWERCASE_REPO_OWNER }}/docmost-mcp:rolling
            ghcr.io/${{ env.LOWERCASE_REPO_OWNER }}/docmost-mcp:${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
