version: "3.8"
services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: docmost
      POSTGRES_USER: docmost
      POSTGRES_PASSWORD: docmost
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docmost"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  docmost:
    image: docmost/docmost:latest
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_URL: http://localhost:3000
      APP_SECRET: integration-test-secret-32chars-min
      DATABASE_URL: postgresql://docmost:docmost@postgres:5432/docmost
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
